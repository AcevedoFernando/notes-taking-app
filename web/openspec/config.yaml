context: |
  Notes Flow — a high-fidelity notes-taking frontend built with Next.js 14+ (App Router),
  Tailwind CSS, Lucide React icons, and Zustand/React Context for state management.
  Storybook for component isolation, Playwright for E2E testing.
  Strict Atomic Design hierarchy; design tokens use a warm beige/brown palette (#FAF1E3, #88642A, #957139).
  See CONTEXT.md for the full design system, routing spec, component architecture, and AI instructions.

